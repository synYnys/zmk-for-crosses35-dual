include:
  - board: nice_nano_v2
    shield: crosses_left
    artifact-name: crosses_36_left
    # Zephyr(OS)レベルで警告による停止を物理的に無効化します
    cmake-args: -DZEPHYR_WERROR=OFF -DZEPHYR_STRICT_KCONFIG=OFF -DZMK_KCONFIG_WERROR=n
  - board: nice_nano_v2
    shield: crosses_right
    artifact-name: crosses_36_right
    snippet: studio-rpc-usb-uart
    # 右側も同様に、OSレベルで強制突破させます
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DZEPHYR_WERROR=OFF -DZEPHYR_STRICT_KCONFIG=OFF -DZMK_KCONFIG_WERROR=n
