# Uncomment the following line to enable OLED Displays
CONFIG_ZMK_DISPLAY=y

# 1. Bluetoothの送信電力を最大（+8dBm）にして電波を強くする
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 2. 接続の安定性を向上させる実験的な機能を有効化（Macとの相性改善）
#CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# 3. マウス機能やデータ処理による内部クラッシュ（自動再起動）を防ぐ
#CONFIG_MAIN_STACK_SIZE=2048
#CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# 4. Bluetoothのバッファ設定（Zephyr 4.1 エラー対策済）
#CONFIG_BT_BUF_ACL_TX_COUNT=12
#CONFIG_BT_BUF_EVT_RX_COUNT=14
#CONFIG_BT_L2CAP_TX_BUF_COUNT=12

# Mac/iOSとの接続の互換性を高めるApple用設定
#CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

